<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Quote Recommendation Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
</head>

<body>

<section class="chat-container">

<header class="chat-header">
  💬 Quote Recommendation Chatbot
  <p class="subtitle">Ask for quotes about motivation, life, love and happiness</p>
</header>

<main class="chat-box">

  <div class="message bot-message">
      <div class="avatar">🤖</div>
      <div class="text">
        <p>Hi! Welcome to the Quote Recommendation Chatbot.</p>
        <p>Made by <b>Parth Supekar, Karan Rajput, Vedanshu Marathe, Soham Lonkar</b>.</p>
        <p>Ask me for quotes about motivation, life, love, happiness and more! 😊</p>
      </div>
  </div>

</main>

<form class="chat-input-area">
  <input type="text" id="textInput" placeholder="Type something like 'motivation'..." autocomplete="off">
  <button type="submit">Send</button>
</form>

</section>


<script>

const form = document.querySelector(".chat-input-area");
const input = document.querySelector("#textInput");
const chatBox = document.querySelector(".chat-box");

form.addEventListener("submit", function(e){

  e.preventDefault();

  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  showTyping();

  $.get("/get",{msg:text}).done(function(data){

      removeTyping();
      addMessage(data,"bot");

  });

});


function addMessage(text,type){

  const message = document.createElement("div");

  if(type==="user"){
      message.className="message user-message";
      message.innerHTML=`
      <div class="text">${text}</div>
      <div class="avatar">🧑</div>`;
  }

  else{
      message.className="message bot-message";
      message.innerHTML=`
      <div class="avatar">🤖</div>
      <div class="text">${text}</div>`;
  }

  chatBox.appendChild(message);
  chatBox.scrollTop = chatBox.scrollHeight;

}

function showTyping(){

  const typing=document.createElement("div");
  typing.className="message bot-message typing";
  typing.innerHTML=`
      <div class="avatar">🤖</div>
      <div class="text">Typing...</div>
  `;

  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

}

function removeTyping(){

  const typing=document.querySelector(".typing");
  if(typing) typing.remove();

}

</script>

</body>
</html>
